<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>View Items | Campus Lost & Found</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="logo">Campus Lost & Found</div>
    <div class="nav-right">
      <span class="user-name" id="welcomeName">Welcome, User</span>
      <a href="#" class="logout-btn" id="logoutBtn">Logout</a>
    </div>
  </nav>

  <!-- PAGE -->
  <div class="page-container wide-page">
    <div class="page-header">
      <h1>All Lost & Found Items</h1>
      <p>Browse all reported lost and found items.</p>
    </div>

    <div class="items-container" id="itemsContainer"></div>
  </div>

  <script>
    const userName = localStorage.getItem("userName");
    const userEmail = localStorage.getItem("userEmail");

    if (!userName || !userEmail) {
      window.location.href = "login.html";
    } else {
      document.getElementById("welcomeName").textContent = "Welcome, " + userName;
    }

    document.getElementById("logoutBtn").addEventListener("click", function (e) {
      e.preventDefault();
      localStorage.removeItem("userName");
      localStorage.removeItem("userEmail");
      window.location.href = "login.html";
    });

    async function loadItems() {
      const itemsContainer = document.getElementById("itemsContainer");

      try {
        const response = await fetch("http://localhost:5000/api/items");
        const items = await response.json();

        if (!response.ok) {
          itemsContainer.innerHTML = "<p>Failed to load items.</p>";
          return;
        }

        if (!items.length) {
          itemsContainer.innerHTML = "<p>No items found.</p>";
          return;
        }

        itemsContainer.innerHTML = items.map(item => `
          <div class="item-card">

            <span class="status-badge ${item.type}">
              ${item.type.toUpperCase()}
            </span>

            <h3>${item.itemName}</h3>

            <p><strong>Category:</strong> ${item.category}</p>
            <p><strong>Location:</strong> ${item.location}</p>
            <p><strong>Date:</strong> ${item.date}</p>
            <p><strong>Status:</strong> ${item.status}</p>

            <a href="item-details.html?id=${item._id}" class="details-btn">
              View Details
            </a>

          </div>
        `).join("");

      } catch (error) {
        console.error("Error loading items:", error);
        itemsContainer.innerHTML = "<p>Failed to load items.</p>";
      }
    }

    loadItems();
  </script>

</body>
</html>
